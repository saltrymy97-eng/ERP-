<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <!-- ========== SEO ========== -->
  <meta name="theme-color" content="#083d2b" />
  <meta name="msapplication-TileColor" content="#D4AF37" />
  <meta name="description" content="نظام متابعة حضور وغياب الطلاب بجامعة القرآن الكريم والعلوم الإسلامية - فرع غيل باوزير بحضرموت. نظام إلكتروني متكامل لإدارة الحضور والانصراف بالبصمة." />
  <meta name="keywords" content="حضور, غياب, بصمة, جامعة, القرآن, طلاب, ERP, نظام, أكاديمي" />
  <meta name="author" content="سالم التريمي" />
  
  <!-- ========== Open Graph ========== -->
  <meta property="og:title" content="نظام الحضور والغياب | جامعة القرآن الكريم والعلوم الإسلامية" />
  <meta property="og:description" content="نظام متابعة حضور وغياب الطلاب - إلكتروني - بصمة - إشعارات واتساب" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="ar_SA" />
  
  <!-- ========== الأيقونات ========== -->
  <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/logo.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/logo.png" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png" />
  
  <!-- ========== PWA ========== -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  
  <!-- ========== الخطوط ========== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet" />
  
  <!-- ========== العنوان ========== -->
  <title>نظام الحضور والغياب | جامعة القرآن الكريم والعلوم الإسلامية</title>
  
  <!-- ========== أنماط أولية ========== -->
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Tajawal', sans-serif;
      direction: rtl;
      background: #f8fafc;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    #splash-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #083d2b 0%, #0a1a0f 100%);
      color: white;
      text-align: center;
      font-family: 'Tajawal', sans-serif;
    }
    
    #splash-screen .splash-inner {
      animation: fadeInUp 0.8s ease;
    }
    
    #splash-screen .splash-logo {
      font-size: 5rem;
      animation: floatUpDown 2s ease-in-out infinite;
      filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.6));
    }
    
    #splash-screen h1 {
      font-family: 'Amiri', serif;
      font-size: 2rem;
      color: #D4AF37;
      margin: 15px 0 5px;
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
    }
    
    #splash-screen p {
      color: #FCF6BA;
      opacity: 0.8;
      font-size: 1.1rem;
    }
    
    #splash-screen .splash-loader {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(212, 175, 55, 0.2);
      border-top: 3px solid #D4AF37;
      border-radius: 50%;
      margin: 30px auto;
      animation: spin 1s linear infinite;
    }
    
    @keyframes floatUpDown {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* ضمان اتجاه الكتابة من اليمين لليسار */
    input, textarea, select {
      direction: rtl !important;
      text-align: right !important;
    }
  </style>
</head>
<body style="direction: rtl; text-align: right;">
  <!-- ========== شاشة التحميل الأولية ========== -->
  <div id="splash-screen">
    <div class="splash-inner">
      <div class="splash-logo">🏛️</div>
      <h1>نظام متابعة الحضور والغياب</h1>
      <p>جامعة القرآن الكريم والعلوم الإسلامية</p>
      <p style="font-size: 0.9rem; opacity: 0.6;">فرع غيل باوزير - حضرموت</p>
      <div class="splash-loader"></div>
      <p style="font-size: 0.85rem; opacity: 0.5;">جاري تحميل النظام...</p>
    </div>
  </div>
  
  <!-- ========== تطبيق React ========== -->
  <noscript>
    <div style="text-align: center; padding: 50px; font-family: 'Tajawal', sans-serif;">
      <h2 style="color: #083d2b;">⚠️ تنبيه</h2>
      <p>يجب تفعيل JavaScript لتشغيل نظام الحضور والغياب.</p>
      <p>يرجى تفعيل JavaScript في إعدادات المتصفح ثم إعادة تحميل الصفحة.</p>
    </div>
  </noscript>
  
  <div id="root"></div>
  
  <!-- ========== تسجيل Service Worker ========== -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('%PUBLIC_URL%/sw.js')
          .then(function(registration) {
            console.log('✅ Service Worker مسجل بنجاح');
          })
          .catch(function(error) {
            console.log('❌ فشل تسجيل Service Worker:', error);
          });
      });
    }
  </script>
</body>
</html>
