  <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/logo.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/logo.png" />

  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <meta name="apple-mobile-web-app-title" content="نظام الحضور" />
  
  <!-- ========== الخطوط ========== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet" />
  
  <!-- ========== العنوان ========== -->
  <title>نظام الحضور والغياب | جامعة القرآن الكريم والعلوم الإسلامية</title>
  
  <!-- ========== أنماط شاشة التحميل ========== -->
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Tajawal', sans-serif;
      background: #f8fafc;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    #splash-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #083d2b 0%, #0a1a0f 100%);
      color: white;
      text-align: center;
      font-family: 'Tajawal', sans-serif;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }
    
    #splash-screen .splash-logo {
      font-size: 5rem;
      animation: floatUpDown 2s ease-in-out infinite;
      filter: drop-shadow(0 0 30px rgba(212,175,55,0.6));
    }
    
    #splash-screen h1 {
      font-family: 'Amiri', serif;
      font-size: 2rem;
      color: #D4AF37;
      margin: 15px 0 5px;
    }
    
    #splash-screen p {
      color: #FCF6BA;
      opacity: 0.8;
    }
    
    #splash-screen .splash-loader {
      width: 50px; height: 50px;
      border: 3px solid rgba(212,175,55,0.2);
      border-top: 3px solid #D4AF37;
      border-radius: 50%;
      margin: 30px auto;
      animation: spin 1s linear infinite;
    }
    
    @keyframes floatUpDown {
      0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}
    }
    @keyframes spin {
      to{transform:rotate(360deg)}
    }
  </style>
</head>
<body>
  <!-- ========== شاشة التحميل ========== -->
  <div id="splash-screen">
    <div style="animation: fadeInUp 0.8s ease;">
      <div class="splash-logo">🏛️</div>
      <h1>نظام متابعة الحضور والغياب</h1>
      <p>جامعة القرآن الكريم والعلوم الإسلامية</p>
      <p style="font-size:0.9rem;opacity:0.6;">فرع غيل باوزير - حضرموت</p>
      <div class="splash-loader"></div>
      <p style="font-size:0.85rem;opacity:0.5;">جاري تحميل النظام...</p>
    </div>
  </div>
  
  <!-- ========== NoScript ========== -->
  <noscript>
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:50px;font-family:'Tajawal',sans-serif;background:#f8fafc;">
      <div>
        <div style="font-size:4rem;margin-bottom:20px;">⚠️</div>
        <h2 style="color:#083d2b;font-family:'Amiri',serif;">تنبيه هام</h2>
        <p style="color:#64748b;">يجب تفعيل JavaScript لتشغيل النظام.</p>
      </div>
    </div>
  </noscript>
  
  <!-- ========== React ========== -->
  <div id="root"></div>
  
  <!-- ========== Service Worker ========== -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('%PUBLIC_URL%/sw.js')
          .then(function(r) { console.log('✅ SW:', r.scope); })
          .catch(function(e) { console.warn('⚠️ SW:', e.message); });
      });
    }
  </script>
  
  <!-- ========== إخفاء شاشة التحميل بعد 3 ثواني ========== -->
  <script>
    setTimeout(function() {
      var splash = document.getElementById('splash-screen');
      if (splash) {
        splash.style.opacity = '0';
        splash.style.transition = 'opacity 0.5s ease';
        setTimeout(function() {
          if (splash.parentNode) splash.parentNode.removeChild(splash);
        }, 500);
      }
    }, 3000);
  </script>
</body>
</html>
