name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Build React
        run: npm run build

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/windows
          npx cap init "نظام الحضور" "com.alquran.attendance" --web-dir=build
          npx cap add windows

      - name: Build EXE
        run: |
          cd windows
          npm install
          npm run build

      - name: Upload EXE
        uses: actions/upload-artifact@v3
        with:
          name: Attendance-System
          path: windows/output/*.exe
